<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Care Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">

  <div class="text-center py-4 border-bottom">
    <img src="imgs/puppy.png" alt="icon" width="100">
    <h1 class="mt-2 fw-bold">PetCare+</h1>
    <p class="text-muted">Keep track of your digital pets!!</p>
  </div>

  <div class="container py-4">
    <div class="row g-4">

      <div class="col-md-5">

        <!-- add pet Form -->
        <div class="card mb-4">
          <div class="card-body">
            <h6 class="card-title fw-bold">Add a Pet</h6>
            <div class="mb-2">
              <label class="form-label">Name</label>
              <input type="text" id="petName" class="form-control form-control-sm" placeholder="Example: Spots">
            </div>
            <div class="mb-3">
              <label class="form-label">Breed</label>
              <div id="BreedPicker" class="d-flex gap-2 flex-wrap">

                <span class="breed-opt selected" data-breed="Labrador Retriever" data-img="imgs/labrador.png" title="Labrador Retriever">
                  <img src="imgs/labrador.png" alt="lbrd_icon">
                </span>
                <span class="breed-opt" data-breed="Beagle" data-img="imgs/beagle.png" title="Beagle">
                  <img src="imgs/beagle.png" alt="bgl_icon">
                </span>
                <span class="breed-opt" data-breed="Dachshund" data-img="imgs/dachshund.png" title="Dachshund">
                  <img src="imgs/dachshund.png" alt="dchs_icon">
                </span>
                <span class="breed-opt" data-breed="Dalmatian" data-img="imgs/puppy.png" title="Dalmatian">
                  <img src="imgs/puppy.png" alt="dmtn_icon">
                </span>
                <span class="breed-opt" data-breed="Golden Retriever" data-img="imgs/golden.png" title="Golden Retriever">
                  <img src="imgs/golden.png" alt="gldn_icon">
                </span>
                <span class="breed-opt" data-breed="Yorkshire Terrier" data-img="imgs/yorkshire.png" title="Yorkshire Terrier">
                  <img src="imgs/yorkshire.png" alt="yksh_icon">
                </span>
                <span class="breed-opt" data-breed="Chihuahua" data-img="imgs/chihuahua.png" title="Chihuahua">
                  <img src="imgs/chihuahua.png" alt="chh_icon">
                </span>
                <span class="breed-opt" data-breed="Miniature Schnauzer" data-img="imgs/schnauzer.png" title="Miniature Schnauzer">
                  <img src="imgs/schnauzer.png" alt="schn_icon">
                </span>
                <span class="breed-opt" data-breed="Poodle" data-img="imgs/poodle.png" title="Poodle">
                  <img src="imgs/poodle.png" alt="pdl_icon">
                </span>
                <span class="breed-opt" data-breed="Shiba Inu" data-img="imgs/shiba.png" title="Shiba Inu">
                  <img src="imgs/shiba.png" alt="shb_icon">
                </span>
                <span class="breed-opt" data-breed="Siberian Husky" data-img="imgs/husky.png" title="Siberian Husky">
                  <img src="imgs/husky.png" alt="hsk_icon">
                </span>
                <span class="breed-opt" data-breed="Boxer" data-img="imgs/boxer.png" title="Boxer">
                  <img src="imgs/boxer.png" alt="bxr_icon">
                </span>
                <span class="breed-opt" data-breed="German Shepherd" data-img="imgs/gshepherd.png" title="German Shepherd">
                  <img src="imgs/gshepherd.png" alt="gshp_icon">
                </span>
                <span class="breed-opt" data-breed="Pembroke Welsh Corgi" data-img="imgs/corgi.png" title="Pembroke Welsh Corgi">
                  <img src="imgs/corgi.png" alt="crg_icon">
                </span>
                <span class="breed-opt" data-breed="Cavalier King Charles Spaniel" data-img="imgs/cavalier.png" title="Cavalier K.C. Spaniel">
                  <img src="imgs/cavalier.png" alt="cvlr_icon">
                </span>
                <span class="breed-opt" data-breed="Shih Tzu" data-img="imgs/shihtzu.png" title="Shih Tzu">
                  <img src="imgs/shihtzu.png" alt="shtz_icon">
                </span>
                <span class="breed-opt" data-breed="Maltese" data-img="imgs/maltese.jpg" title="Maltese">
                  <img src="imgs/maltese.jpg" alt="mlts_icon">
                </span>
                <span class="breed-opt" data-breed="Jack Russell Terrier" data-img="imgs/jackrussell.png" title="Jack Russell Terrier">
                  <img src="imgs/jackrussell.png" alt="jkrs_icon">
                </span>

              </div>
              <!-- selected breed label -->
              <div class="mt-2 text-muted small">Selected: <strong id="selectedBreedLabel">Labrador Retriever</strong></div>
            </div>
            <div class="mb-2">
              <label class="form-label">Age (years)</label>
              <input type="number" id="petAge" class="form-control form-control-sm" placeholder="ex: 3" min="0">
            </div>
            <button id="addPetBtn" class="btn btn-primary btn-sm w-100" onclick="addPet()">Add Pet</button>
            <button id="cancelEditBtn" class="btn btn-outline-secondary btn-sm w-100 mt-1" onclick="cancelEdit()" style="display:none">Cancel Edit</button>
          </div>
        </div>

        <!-- pets Table -->
        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th></th>
                <th>Name</th>
                <th>Breed</th>
                <th>Age</th>
                <th colspan="2"></th>
              </tr>
            </thead>
            <tbody id="petTableBody">
              <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- RIGHT: Logs -->
      <div class="col-md-7">
        <h5 class="fw-bold mb-3">Care Log</h5>

        <div id="logPlaceholder" class="text-center text-muted py-5">
          <p>← Select a pet to see their log</p>
        </div>

        <div id="logContent" style="display:none">

          <div class="alert alert-light border d-flex align-items-center gap-2 mb-3">
            <img id="selectedPetImg" src="" alt="pet" width="40">
            <div>
              <strong id="selectedPetName"></strong>
              <div class="text-muted small" id="selectedPetInfo"></div>
            </div>
          </div>

          <!-- Add Log Form -->
          <div class="card mb-3">
            <div class="card-body">
              <h6 class="card-title fw-bold">New Log Entry</h6>
              <div class="mb-2">
                <label class="form-label">Type</label>
                <select id="logType" class="form-select form-select-sm">
                  <option value="feeding">Feeding</option>
                  <option value="walk">Walk</option>
                  <option value="vet">Vet Visit</option>
                  <option value="bath">Bath</option>
                  <option value="note">Note</option>
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">Note (optional)</label>
                <input type="text" id="logNote" class="form-control form-control-sm" placeholder="e.g. Ate all food!">
              </div>
              <button class="btn btn-success btn-sm w-100" onclick="addLog()">Save Entry</button>
            </div>
          </div>

          <!-- Logs Table -->
          <div class="table-responsive">
            <table class="table table-bordered table-sm align-middle">
              <thead class="table-light">
                <tr>
                  <th>Type</th>
                  <th>Note</th>
                  <th>Date</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="logTableBody">
                <tr><td colspan="4" class="text-center text-muted">No entries yet</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 999">
    <div id="toast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
